services:
  - type: web
    name: socialrl-arena
    env: node
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: socialrl-arena-db
          property: connectionString
      - key: LLM_PROVIDER
        value: local

databases:
  - name: socialrl-arena-db
    databaseName: socialrl
    user: socialrl
    plan: starter
