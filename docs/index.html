<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SocialRL Arena Demo Video</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #121826;
        background: #f7f8fb;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1.1;
      }
      p {
        color: #4b5563;
        font-size: 16px;
        line-height: 1.55;
        margin: 0 0 18px;
      }
      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
        border: 1px solid #d8dde7;
        background: #0f172a;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }
      a {
        color: #0f4c81;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SocialRL Arena Demo</h1>
      <p>
        This browser recording shows the realtime group chat, debug/eval telemetry,
        Agent Performance Report, and agent-specific review flow.
      </p>
      <p>
        The same walkthrough is embedded as an animated preview in the repository README.
      </p>
      <video controls preload="metadata" src="./assets/socialrl-demo.mp4">
        Your browser does not support embedded video playback.
      </video>
      <div class="links">
        <a href="https://github.com/nanogram/socialrl-arena">GitHub repository</a>
      </div>
    </main>
  </body>
</html>
